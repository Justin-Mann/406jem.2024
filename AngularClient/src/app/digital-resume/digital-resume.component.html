<div class="container">
    <div class="row mb-2">
        <div class="col col-sm-6 col-12 offset-sm-3 text-center">
            <a role="button" class="btn btn-outline-secondary btn-sm" href="./assets/docs/jmResume.8.2025.pdf" target="_blank">
                <i class="bi bi-file-earmark-pdf me-1"></i>PDF Resume (ATS Friendly)
            </a>
        </div>
    </div>

    @if (isLoading()) {
        <app-spinner></app-spinner>
    }

    @if (resumeData(); as resume) {
        <div class="row header">
            <div id="logo" class="col col-2">
                <img [src]="logoUrl" alt="Logo" />
            </div>
            <div class="col col-6">
                <span id="name" class="h1 text-uppercase">{{ resume.fName }} {{ resume.mName }} {{ resume.lName }}</span><br />
                <span id="position" class="h3 text-uppercase">{{ resume.position }}</span><br />
                <span id="subtitle" class="text-uppercase">{{ resume.subtitle }}</span>
            </div>
            <div class="col col-4">
                <p id="simplegoal">{{ resume.simpleGoal }}</p>
            </div>
        </div>
        <div class="row">
            <div class="col col-md-8 col-12">
                <app-general-section [sectionName]="'Profile'" [profileItems]="resume.profile"></app-general-section>
                <app-work-experience-section [xpItems]="resume.workExperience"></app-work-experience-section>
            </div>
            <div class="col col-md-4 col-12">
                <app-contact-section [contactItems]="resume.contact"></app-contact-section>
                <app-education-section [eduItems]="resume.education"></app-education-section>
                <app-custom-sections [customItems]="resume.customSections"></app-custom-sections>
            </div>
        </div>
    }
</div>
