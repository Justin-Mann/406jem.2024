name: Deploy – Blazor Client (Azure SWA)

on:
  push:
    branches:
      - main
    paths:
      - 'BlazorClient/**'
      - '.github/workflows/deploy-blazor.yml'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
    paths:
      - 'BlazorClient/**'
      - '.github/workflows/deploy-blazor.yml'
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.x'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Test Blazor Client
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('BlazorClient/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore BlazorClient.Tests/BlazorClient.Tests.csproj
        working-directory: ./BlazorClient

      - name: Run tests
        run: dotnet test BlazorClient.Tests/BlazorClient.Tests.csproj --no-restore --logger "console;verbosity=normal"
        working-directory: ./BlazorClient

      - name: Notify Claude of test failures
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_URL=$(gh issue create \
            --title "Test failures blocked Blazor Client deploy (${{ github.sha }})" \
            --body "Automated: unit tests failed in the deploy pipeline.")
          ISSUE_NUMBER=$(basename "$ISSUE_URL")
          gh issue comment "$ISSUE_NUMBER" --body "@claude

          Unit tests failed and blocked the **${{ github.workflow }}** deploy pipeline.

          - Commit: \`${{ github.sha }}\`
          - Branch: \`${{ github.ref_name }}\`
          - Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Please read the test failure output from the CI run above, find the root cause
          in the BlazorClient code or tests, fix it, and open a pull request."

  build_and_deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    needs: test
    name: Build and Deploy Blazor Client
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Build and Deploy to Azure Static Web Apps
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WITTY_PLANT_07C26361E }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "./BlazorClient"
          output_location: "wwwroot"

  close_staging_environment:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close PR Staging Environment
    steps:
      - name: Close Pull Request Staging Environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WITTY_PLANT_07C26361E }}
          action: "close"
