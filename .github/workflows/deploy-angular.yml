name: Deploy – Angular Client (Azure SWA)

on:
  push:
    branches:
      - main
    paths:
      - 'AngularClient/**'
      - '.github/workflows/deploy-angular.yml'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
    paths:
      - 'AngularClient/**'
      - '.github/workflows/deploy-angular.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Test Angular Client
    permissions:
      contents: write
      pull-requests: write
      actions: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: AngularClient/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./AngularClient

      - name: Run tests
        run: npx ng test --watch=false --no-progress --browsers=ChromeHeadless
        working-directory: ./AngularClient

      - name: Invoke Claude to fix failures
        if: failure()
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          prompt: |
            Unit tests failed in the **${{ github.workflow }}** pipeline.

            - Commit: `${{ github.sha }}`
            - Branch: `${{ github.ref_name }}`
            - Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Read the test failure output from the CI run above, find the root cause in the
            AngularClient code or tests, fix it, and open a pull request.

  build_and_deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    needs: test
    name: Build and Deploy Angular Client
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Build and Deploy to Azure Static Web Apps
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_GENTLE_CLIFF_07E56211E }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "./AngularClient"
          output_location: "dist/angular-client/browser"

  close_staging_environment:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close PR Staging Environment
    steps:
      - name: Close Pull Request Staging Environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_GENTLE_CLIFF_07E56211E }}
          action: "close"
