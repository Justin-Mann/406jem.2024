name: Deploy – Angular Client (Azure SWA)

on:
  push:
    branches:
      - main
    paths:
      - 'AngularClient/**'
      - '.github/workflows/deploy-angular.yml'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
    paths:
      - 'AngularClient/**'
      - '.github/workflows/deploy-angular.yml'
  workflow_dispatch:


jobs:
  test:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Test Angular Client
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: AngularClient/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./AngularClient

      - name: Run tests
        run: npx ng test --watch=false --no-progress --browsers=ChromeHeadless
        working-directory: ./AngularClient

      - name: Notify Claude of test failures
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.CLAUDE_NOTIFY_PAT }}
        run: |
          ISSUE_NUMBER=$(curl -s -X POST \
            -H "Authorization: token ${{ secrets.CLAUDE_NOTIFY_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues" \
            -d '{"title":"Test failures blocked Angular Client deploy (${{ github.sha }})","body":"Automated: unit tests failed in the deploy pipeline."}' \
            | jq -r '.number')
          gh issue comment "$ISSUE_NUMBER" --body "@claude

          Unit tests failed and blocked the **${{ github.workflow }}** deploy pipeline.

          - Commit: \`${{ github.sha }}\`
          - Branch: \`${{ github.ref_name }}\`
          - Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Please read the test failure output from the CI run above, find the root cause
          in the AngularClient code or tests, fix it, and open a pull request."

  build_and_deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    needs: test
    name: Build and Deploy Angular Client
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Build and Deploy to Azure Static Web Apps
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_GENTLE_CLIFF_07E56211E }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "./AngularClient"
          output_location: "dist/angular-client/browser"

  close_staging_environment:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close PR Staging Environment
    steps:
      - name: Close Pull Request Staging Environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_GENTLE_CLIFF_07E56211E }}
          action: "close"
          app_location: "./AngularClient"
