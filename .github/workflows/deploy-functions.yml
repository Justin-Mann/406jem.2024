name: Deploy – ResumeFunctions (Azure Functions)

# Fires only when ResumeFunctions source changes.
#
# Required GitHub secrets:
#   CLAUDE_CODE_OAUTH_TOKEN                        — Claude Code OAuth token
#   AZURE_RESUMEFUNCTIONS_STAGING_PUBLISH_PROFILE  — publish profile for the staging slot
#   AZURE_CREDENTIALS                              — service principal JSON for slot swap
#
# Required GitHub repository variables:
#   AZURE_RESOURCE_GROUP        — resource group that owns the function app
#   AZURE_FUNCTIONS_STAGING_URL — base URL of the staging slot (no trailing slash)
#                                 e.g. https://406resumeapi-staging.azurewebsites.net

on:
  push:
    branches:
      - main
    paths:
      - 'ResumeFunctions/**'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  AZURE_FUNCTIONAPP_NAME: 406resumeapi
  DOTNET_VERSION: '10.x'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ── 1. Unit tests ──────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    name: Unit Tests
    permissions:
      contents: write
      pull-requests: write
      actions: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('ResumeFunctions/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore ResumeFunctions.Tests/ResumeFunctions.Tests.csproj
        working-directory: ./ResumeFunctions

      - name: Run unit tests
        run: >
          dotnet test ResumeFunctions.Tests/ResumeFunctions.Tests.csproj
          --no-restore
          --filter "Category!=Integration"
          --logger "console;verbosity=normal"
        working-directory: ./ResumeFunctions

      - name: Invoke Claude to fix failures
        if: failure()
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          prompt: |
            Unit tests failed in the **${{ github.workflow }}** pipeline.

            - Commit: `${{ github.sha }}`
            - Branch: `${{ github.ref_name }}`
            - Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Read the test failure output from the CI run above, find the root cause in the
            ResumeFunctions code or tests, fix it, and open a pull request.

  # ── 2. Build & package ─────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: test
    name: Build

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('ResumeFunctions/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore
        working-directory: ./ResumeFunctions

      - name: Publish
        run: dotnet publish --configuration Release --output ./publish
        working-directory: ./ResumeFunctions

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: resumefunctions-app
          path: ./ResumeFunctions/publish
          include-hidden-files: true

  # ── 3. Deploy to staging slot ──────────────────────────────────────────────
  deploy-staging:
    runs-on: ubuntu-latest
    needs: build
    name: Deploy to Staging

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: resumefunctions-app
          path: ./publish

      - name: Deploy to staging slot
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          slot-name: staging
          publish-profile: ${{ secrets.AZURE_RESUMEFUNCTIONS_STAGING_PUBLISH_PROFILE }}
          package: ./publish

  # ── 4. Integration tests against staging ───────────────────────────────────
  integration-test:
    runs-on: ubuntu-latest
    needs: deploy-staging
    name: Integration Tests (Staging)
    permissions:
      contents: write
      pull-requests: write
      actions: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('ResumeFunctions/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore ResumeFunctions.Tests/ResumeFunctions.Tests.csproj
        working-directory: ./ResumeFunctions

      - name: Wait for staging slot to warm up
        run: sleep 20

      - name: Run integration tests
        run: >
          dotnet test ResumeFunctions.Tests/ResumeFunctions.Tests.csproj
          --no-restore
          --filter "Category=Integration"
          --logger "console;verbosity=normal"
        working-directory: ./ResumeFunctions
        env:
          FUNCTIONS_STAGING_URL: ${{ vars.AZURE_FUNCTIONS_STAGING_URL }}

      - name: Invoke Claude to fix failures
        if: failure()
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          prompt: |
            Integration tests against the staging slot failed and blocked promotion to production.

            - Staging URL: ${{ vars.AZURE_FUNCTIONS_STAGING_URL }}
            - Commit: `${{ github.sha }}`
            - Branch: `${{ github.ref_name }}`
            - Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            The staging slot is still running this build — you can call it directly at the URL above.
            Read the integration test failure output from the CI run, find the root cause in the
            ResumeFunctions code or tests, fix it, and open a pull request.

  # ── 5. Promote staging → production ───────────────────────────────────────
  promote:
    runs-on: ubuntu-latest
    needs: integration-test
    name: Promote to Production

    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Swap staging → production
        run: |
          az functionapp deployment slot swap \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "${{ env.AZURE_FUNCTIONAPP_NAME }}" \
            --slot staging \
            --target-slot production
