name: Deploy – ResumeFunctions (Azure Functions)

# Fires only when ResumeFunctions source changes.
# Required secret: AZURE_RESUMEFUNCTIONS_PUBLISH_PROFILE
# Azure Functions App name: 406resumeapi

on:
  push:
    branches:
      - main
    paths:
      - 'ResumeFunctions/**'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  AZURE_FUNCTIONAPP_NAME: 406resumeapi
  DOTNET_VERSION: '10.x'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test:
    runs-on: ubuntu-latest
    name: Test ResumeFunctions
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('ResumeFunctions/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore ResumeFunctions.Tests/ResumeFunctions.Tests.csproj
        working-directory: ./ResumeFunctions

      - name: Run tests
        run: dotnet test ResumeFunctions.Tests/ResumeFunctions.Tests.csproj --no-restore --logger "console;verbosity=normal"
        working-directory: ./ResumeFunctions

      - name: Report failures to Claude
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "Test failures blocked ResumeFunctions deploy (${{ github.sha }})" \
            --body "@claude

          Unit tests failed and blocked the **${{ github.workflow }}** deploy pipeline.

          - **Commit:** \`${{ github.sha }}\`
          - **Branch:** \`${{ github.ref_name }}\`
          - **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Please review the test failures in the run linked above, fix the failing tests, and push a corrected commit."

  build:
    runs-on: ubuntu-latest
    needs: test
    name: Build ResumeFunctions

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('ResumeFunctions/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore
        working-directory: ./ResumeFunctions

      - name: Publish
        run: dotnet publish --configuration Release --output ./publish
        working-directory: ./ResumeFunctions

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: resumefunctions-app
          path: ./ResumeFunctions/publish
          include-hidden-files: true

  deploy:
    runs-on: ubuntu-latest
    needs: build
    name: Deploy ResumeFunctions

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: resumefunctions-app
          path: ./publish

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_RESUMEFUNCTIONS_PUBLISH_PROFILE }}
          package: ./publish
