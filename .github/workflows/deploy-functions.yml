name: Deploy – ResumeFunctions (Azure Functions)

# Fires only when ResumeFunctions source changes.
#
# Required GitHub secrets:
#   CLAUDE_CODE_OAUTH_TOKEN                        — Claude Code OAuth token
#   AZURE_RESUMEFUNCTIONS_STAGING_PUBLISH_PROFILE  — publish profile for the staging slot
#   AZURE_CREDENTIALS                              — service principal JSON for slot swap
#
# Required GitHub repository variables:
#   AZURE_RESOURCE_GROUP        — resource group that owns the function app
#   AZURE_FUNCTIONS_STAGING_URL — base URL of the staging slot (no trailing slash)
#                                 e.g. https://406resumeapi-staging.azurewebsites.net

on:
  push:
    branches:
      - main
    paths:
      - 'ResumeFunctions/**'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  AZURE_FUNCTIONAPP_NAME: 406resumeapi
  DOTNET_VERSION: '10.x'

jobs:
  # ── 1. Unit tests ──────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    name: Unit Tests
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('ResumeFunctions/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore ResumeFunctions.Tests/ResumeFunctions.Tests.csproj
        working-directory: ./ResumeFunctions

      - name: Run unit tests
        run: >
          dotnet test ResumeFunctions.Tests/ResumeFunctions.Tests.csproj
          --no-restore
          --filter "Category!=Integration"
          --logger "console;verbosity=normal"
        working-directory: ./ResumeFunctions

      - name: Notify Claude of unit test failures
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.CLAUDE_NOTIFY_PAT }}
        run: |
          ISSUE_URL=$(gh issue create \
            --title "Unit test failures blocked ResumeFunctions deploy (${{ github.sha }})" \
            --body "Automated: unit tests failed in the deploy pipeline.")
          ISSUE_NUMBER=$(basename "$ISSUE_URL")
          gh issue comment "$ISSUE_NUMBER" --body "@claude

          Unit tests failed and blocked the **${{ github.workflow }}** deploy pipeline.

          - Commit: \`${{ github.sha }}\`
          - Branch: \`${{ github.ref_name }}\`
          - Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Please read the test failure output from the CI run above, find the root cause
          in the ResumeFunctions code or tests, fix it, and open a pull request."

  # ── 2. Build & package ─────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: test
    name: Build

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('ResumeFunctions/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore
        working-directory: ./ResumeFunctions

      - name: Publish
        run: dotnet publish --configuration Release --output ./publish
        working-directory: ./ResumeFunctions

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: resumefunctions-app
          path: ./ResumeFunctions/publish
          include-hidden-files: true

  # ── 3. Deploy to staging slot ──────────────────────────────────────────────
  deploy-staging:
    runs-on: ubuntu-latest
    needs: build
    name: Deploy to Staging

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v7
        with:
          name: resumefunctions-app
          path: ./publish

      - name: Deploy to staging slot
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          slot-name: staging
          publish-profile: ${{ secrets.AZURE_RESUMEFUNCTIONS_STAGING_PUBLISH_PROFILE }}
          package: ./publish

  # ── 4. Integration tests against staging ───────────────────────────────────
  integration-test:
    runs-on: ubuntu-latest
    needs: deploy-staging
    name: Integration Tests (Staging)
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('ResumeFunctions/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore ResumeFunctions.Tests/ResumeFunctions.Tests.csproj
        working-directory: ./ResumeFunctions

      - name: Wait for staging slot to warm up
        run: sleep 20

      - name: Run integration tests
        run: >
          dotnet test ResumeFunctions.Tests/ResumeFunctions.Tests.csproj
          --no-restore
          --filter "Category=Integration"
          --logger "console;verbosity=normal"
        working-directory: ./ResumeFunctions
        env:
          FUNCTIONS_STAGING_URL: ${{ vars.AZURE_FUNCTIONS_STAGING_URL }}

      - name: Notify Claude of integration test failures
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.CLAUDE_NOTIFY_PAT }}
        run: |
          ISSUE_URL=$(gh issue create \
            --title "Integration test failures blocked ResumeFunctions promote (${{ github.sha }})" \
            --body "Automated: integration tests against staging slot failed.")
          ISSUE_NUMBER=$(basename "$ISSUE_URL")
          gh issue comment "$ISSUE_NUMBER" --body "@claude

          Integration tests against the staging slot failed and blocked promotion to production.

          - Staging URL: ${{ vars.AZURE_FUNCTIONS_STAGING_URL }}
          - Commit: \`${{ github.sha }}\`
          - Branch: \`${{ github.ref_name }}\`
          - Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          The staging slot at the URL above is still running this build — you can call it directly.
          Please read the integration test failure output from the CI run above, fix the root cause
          in the ResumeFunctions code or tests, fix it, and open a pull request."

  # ── 5. Promote staging → production ───────────────────────────────────────
  promote:
    runs-on: ubuntu-latest
    needs: integration-test
    name: Promote to Production

    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Swap staging → production
        run: |
          az functionapp deployment slot swap \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "${{ env.AZURE_FUNCTIONAPP_NAME }}" \
            --slot staging \
            --target-slot production
