name: Deploy – ResumeFunctions (Azure Functions)

# Fires only when ResumeFunctions source changes.
# Required secret: AZURE_RESUMEFUNCTIONS_PUBLISH_PROFILE
# Azure Functions App name: 406resumeapi

on:
  push:
    branches:
      - main
    paths:
      - 'ResumeFunctions/**'
      - '.github/workflows/deploy-resume-functions.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  AZURE_FUNCTIONAPP_NAME: 406resumeapi
  DOTNET_VERSION: '9.x'

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build ResumeFunctions

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('ResumeFunctions/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore
        working-directory: ./ResumeFunctions

      - name: Build
        run: dotnet build --configuration Release --no-restore
        working-directory: ./ResumeFunctions

      - name: Publish
        run: dotnet publish --configuration Release --no-build --output ./publish
        working-directory: ./ResumeFunctions

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: resumefunctions-app
          path: ./ResumeFunctions/publish

  deploy:
    runs-on: ubuntu-latest
    needs: build
    name: Deploy ResumeFunctions

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: resumefunctions-app
          path: ./publish

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_RESUMEFUNCTIONS_PUBLISH_PROFILE }}
          package: ./publish
